# ─── ConvTimeNet Model Configuration ───
# Deformable-patch Conv-based Time Series Classifier
# Cheng et al. (WWW 2025)
# CPU-native — no CUDA-only dependencies.
#
# Structural re-parameterisation merges parallel depthwise convs at eval()
# per D020 (device-agnostic design).

model:
  name: "convtimenet"
  architecture:
    d_model: 128
    d_ff: 512
    patch_size: 8
    patch_stride: 4
    dw_ks: [7, 13, 19]
    dropout: 0.1234
    pooling_tp: "max"
    fc_dropout: 0.0
    n_classes: 10

  training:
    lr: 5.0000000000e-04
    weight_decay: 0.0001
    scheduler: "cosine"
    warmup_epochs: 5

  optuna_search_space:
    d_model:
      type: "categorical"
      choices: [64, 128, 256]
    d_ff:
      type: "categorical"
      choices: [128, 256, 512]
    patch_size:
      type: "categorical"
      choices: [4, 8, 16]
    patch_stride:
      type: "categorical"
      choices: [2, 4, 8]
    dw_ks:
      type: "categorical"
      choices:
        - [5, 9, 13]
        - [7, 13, 19]
        - [9, 19, 29]
    dropout:
      type: "float"
      low: 0.05
      high: 0.4
    lr:
      type: "float"
      low: 0.00001
      high: 0.005
      log: true
    pooling_tp:
      type: "categorical"
      choices: ["max", "mean"]
