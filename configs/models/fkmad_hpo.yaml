# ─── FKM-AD Model Configuration ───
# Fourier-KAN → Mamba → GatedSharpening → AttentionPooling
# Wang et al. (2025, arXiv:2511.15083) adapted for 3W classification
# CUDA required (mamba_ssm)
# HPO-optimal params applied from trial 25 (accuracy=0.9459)

model:
  name: "fkmad"
  architecture:
    d_model: 256
    d_state: 32
    d_conv: 4
    expand: 2
    n_fourier_freqs: 15
    fourier_rank: 32
    fourier_scale: 1.0
    gamma_z_init: 2.6634386107304193
    n_mamba_layers: 2
    dropout: 0.39228800977342004

  training:
    lr: 0.0015538462556350264
    weight_decay: 0.0001
    scheduler: "cosine"
    warmup_epochs: 5

  optuna_search_space:
    d_model:
      type: "categorical"
      choices: [64, 128, 256]
    d_state:
      type: "categorical"
      choices: [8, 16, 32]
    n_fourier_freqs:
      type: "int"
      low: 4
      high: 16
    fourier_rank:
      type: "categorical"
      choices: [16, 32, 64]
    n_mamba_layers:
      type: "int"
      low: 1
      high: 4
    dropout:
      type: "float"
      low: 0.05
      high: 0.4
    lr:
      type: "float"
      low: 0.00001
      high: 0.005
      log: true
    gamma_z_init:
      type: "float"
      low: 0.1
      high: 5.0
