# ─── FKM-AD Model Configuration (BASELINE for raw path) ───
# Fourier-KAN → Mamba → GatedSharpening → AttentionPooling
# Wang et al. (2025, arXiv:2511.15083) adapted for 3W classification
# CUDA required (mamba_ssm)
# BASELINE params — used for fkmad_raw (720x27) since HPO was feature-path only

model:
  name: "fkmad"
  architecture:
    d_model: 128
    d_state: 16
    d_conv: 4
    expand: 2
    n_fourier_freqs: 8
    fourier_rank: 32
    fourier_scale: 1.0
    gamma_z_init: 1.0
    n_mamba_layers: 2
    dropout: 0.1

  training:
    lr: 0.0005
    weight_decay: 0.0001
    scheduler: "cosine"
    warmup_epochs: 5

  optuna_search_space:
    d_model:
      type: "categorical"
      choices: [64, 128, 256]
    d_state:
      type: "categorical"
      choices: [8, 16, 32]
    n_fourier_freqs:
      type: "int"
      low: 4
      high: 16
    fourier_rank:
      type: "categorical"
      choices: [16, 32, 64]
    n_mamba_layers:
      type: "int"
      low: 1
      high: 4
    dropout:
      type: "float"
      low: 0.05
      high: 0.4
    lr:
      type: "float"
      low: 0.00001
      high: 0.005
      log: true
    gamma_z_init:
      type: "float"
      low: 0.1
      high: 5.0
