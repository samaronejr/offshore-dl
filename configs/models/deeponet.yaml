# ─── Time-Dependent DeepONet Model Configuration ───
# Neural operator approach for offshore monitoring tasks
# Branch uses 1D-CNN (not flat MLP) to preserve temporal structure

model:
  name: "deeponet"
  loss_type: "ce"
  focal_gamma: 2.0
  architecture:
    branch_hidden: [64, 64]       # HPO-optimal branch width=64
    trunk_hidden: [128, 128]      # trunk network layer sizes
    rank: 64                       # HPO-optimal rank (30-trial best, f1=0.941)
    activation: "gelu"
    dropout: 0.077                 # HPO-optimal dropout
    branch_type: "mlp"            # "mlp", "conv1d", or "attention" (for short windows ≤30)

  training:
    lr: 0.00135                    # HPO-optimal lr (K014: YAML lr wins over overrides)
    weight_decay: 0.0001
    scheduler: "cosine"
    warmup_epochs: 5

  optuna_search_space:
    rank:
      type: "categorical"
      choices: [64, 128, 256]
    lr:
      type: "float"
      low: 0.00001
      high: 0.005
      log: true
    dropout:
      type: "float"
      low: 0.05
      high: 0.3
    branch_width:
      type: "categorical"
      choices: [64, 128, 256]
    branch_type:
      type: "categorical"
      choices: ["mlp", "conv1d", "attention"]
    loss_type:
      type: "categorical"
      choices: ["ce", "focal"]
    focal_gamma:
      type: "float"
      low: 0.5
      high: 5.0
    batch_size:
      type: "categorical"
      choices: [16, 32, 64, 128]
    scheduler:
      type: "categorical"
      choices: ["cosine", "onecycle"]
