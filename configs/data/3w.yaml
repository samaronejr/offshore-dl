# ─── 3W v2.0.0 Dataset Configuration ───
# Petrobras 3W — offshore well anomaly detection / classification

data:
  name: "3w"
  task: "classification"
  n_classes: 10

  paths:
    raw: "${paths.raw_data}/3w"
    processed: "${paths.processed_data}/3w"
    folds: "${paths.raw_data}/3w/folds/folds_clf_02.csv"

  # Sensor columns (27 variables from 3W v2.0.0)
  sensor_columns:
    - "ABER-CKGL"
    - "ABER-CKP"
    - "ESTADO-DHSV"
    - "ESTADO-M1"
    - "ESTADO-M2"
    - "ESTADO-PXO"
    - "ESTADO-SDV-GL"
    - "ESTADO-SDV-P"
    - "ESTADO-W1"
    - "ESTADO-W2"
    - "ESTADO-XO"
    - "P-ANULAR"
    - "P-JUS-BS"
    - "P-JUS-CKGL"
    - "P-JUS-CKP"
    - "P-MON-CKGL"
    - "P-MON-CKP"
    - "P-MON-SDV-P"
    - "P-PDG"
    - "PT-P"
    - "P-TPT"
    - "QBS"
    - "QGL"
    - "T-JUS-CKP"
    - "T-MON-CKP"
    - "T-PDG"
    - "T-TPT"

  label_column: "class"
  timestamp_column: "timestamp"

  preprocessing:
    frozen_value_window: 60         # seconds — rolling window for frozen detection
    forward_fill_limit: 300         # seconds — max gap for causal forward fill
    window_size: 720                # timesteps — sliding window for segmentation
    window_stride: 360              # timesteps — stride between windows
    cache_in_memory: true           # 3W fits in RAM (~5 GB processed)
