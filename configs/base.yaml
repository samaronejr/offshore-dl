# ─── Global Configuration ───
# All values can be overridden by data/*.yaml, models/*.yaml, or CLI dotlist.

seed: 42
device: "cuda"

paths:
  project_root: "."
  raw_data: "data/raw"
  processed_data: "data/processed"
  splits: "data/splits"

mlflow:
  tracking_uri: "http://localhost:5000"
  experiment_prefix: "offshore-dl"

optuna:
  storage: "sqlite:///optuna.db"
  n_trials_min: 50
  n_trials_max: 200
  convergence_patience: 20
  convergence_threshold: 0.005
  pruner: "median"

training:
  batch_size: 64
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2
  persistent_workers: true
  max_epochs: 100
  early_stopping_patience: 20
  gradient_clip_val: 1.0
  scheduler: "onecycle"
  scheduler_pct_start: 0.3

logging:
  level: "INFO"
  format: "%(asctime)s [%(name)s] %(levelname)s: %(message)s"
